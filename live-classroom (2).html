<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduLive — Live Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- FULL ORIGINAL STYLING --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--s1:#12151e;--s2:#181c28;--s3:#1e2335;
  --b0:rgba(255,255,255,0.05);--text:#e4e8f4;--muted:#6e7896;
  --accent:#4f82ff;--red:#ff4f4f;--green:#3cd381;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
.container{max-width:1000px;margin:0 auto;padding:2rem}

/* --- LIVE PLAYER COMPONENTS --- */
.video-wrapper {
  position: relative;
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  background: #000;
  border: 1px solid var(--b0);
  box-shadow: 0 24px 48px rgba(0,0,0,0.4);
  margin-bottom: 2rem;
}
.live-tag {
  position: absolute; top: 20px; left: 20px; z-index: 10;
  background: var(--red); color: #fff; padding: 4px 12px;
  border-radius: 4px; font-weight: 700; font-size: 12px;
  display: flex; align-items: center; gap: 6px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* Prevents seeking on the Google Drive player bar */
.no-click-shield {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 55px;
  background: transparent; z-index: 9; cursor: default;
}

iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

/* --- ORIGINAL UI ELEMENTS --- */
.card{background:var(--s1);border:1px solid var(--b0);border-radius:20px;padding:2.5rem}
.input-group{margin-bottom:1.5rem}
label{display:block;margin-bottom:0.6rem;color:var(--muted);font-size:0.85rem;font-weight:500}
input{width:100%;padding:1rem;background:var(--s2);border:1px solid var(--s3);border-radius:10px;color:var(--text);font-family:inherit;transition:0.2s}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(79,130,255,0.1)}
.btn{width:100%;padding:1rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:1rem}
.hidden { display: none !important; }

/* Attendance Log Styling */
#log-body { background: var(--s1); border-radius: 16px; overflow: hidden; border: 1px solid var(--b0); }
.log-row { display: grid; grid-template-columns: 60px 1fr 1fr 120px; padding: 1rem; border-bottom: 1px solid var(--s3); align-items: center; }
</style>
</head>
<body>

<div class="container">
  <div id="join-view" class="card">
    <h2 style="margin-bottom:2rem">Join Today's Class</h2>
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="Enter Name">
    </div>
    <div class="input-group">
      <label>Roll Number</label>
      <input type="text" id="rollInput" placeholder="Enter Roll No.">
    </div>
    <div class="input-group">
      <label>Google Drive Class Link</label>
      <input type="text" id="vidInput" placeholder="https://drive.google.com/file/d/14azNwCY1GbaOKN9I2cLlgB7SxztYHsmG/view?usp=drive_link">
    </div>
    <button class="btn" onclick="playLive()">Start Class</button>
  </div>

  <div id="class-view" class="hidden">
    <div class="video-wrapper">
      <div class="live-tag">● LIVE</div>
      <div class="no-click-shield"></div>
      <iframe id="vPlayer" allow="autoplay"></iframe>
    </div>

    <div id="log-body">
      <div class="log-row" style="background:var(--s2); font-weight:600; color:var(--muted)">
        <span>#</span><span>Student</span><span>Roll</span><span>Joined</span>
      </div>
      <div id="rows-container"></div>
    </div>
    <div style="margin-top:1.5rem; display:flex; gap:10px">
        <button onclick="exportCSV()" style="background:var(--s3); padding:8px 16px; border-radius:6px; color:white; border:none; cursor:pointer">Download Attendance</button>
    </div>
  </div>
</div>

<script>
let roster = JSON.parse(localStorage.getItem('edu_roster')) || [];

function playLive() {
  const n = document.getElementById('nameInput').value.trim();
  const r = document.getElementById('rollInput').value.trim();
  const link = document.getElementById('vidInput').value.trim();

  if(!n || !r || !link) { alert("Missing details!"); return; }

  // GOOGLE DRIVE LINK EXTRACTION
  const fileId = xid(link);
  if(!fileId) { alert("Please provide a valid Google Drive Link"); return; }

  // Set Iframe Source
  const player = document.getElementById('vPlayer');
  player.src = `https://drive.google.com/file/d/${fileId}/preview?autoplay=1`;

  // Original Logic: Log Attendance
  const log = { name: n, roll: r, time: new Date().toLocaleTimeString('en-IN'), date: new Date().toLocaleDateString('en-IN') };
  roster.unshift(log);
  localStorage.setItem('edu_roster', JSON.stringify(roster));

  // Toggle View
  document.getElementById('join-view').classList.add('hidden');
  document.getElementById('class-view').classList.remove('hidden');
  renderList();
}

function renderList() {
  const container = document.getElementById('rows-container');
  container.innerHTML = roster.map((item, index) => `
    <div class="log-row">
      <span style="color:var(--muted)">${roster.length - index}</span>
      <strong>${esc(item.name)}</strong>
      <span>${esc(item.roll)}</span>
      <span style="font-family:'DM Mono'">${item.time}</span>
    </div>
  `).join('');
}

function exportCSV() {
  const head = ["#", "Student Name", "Roll Number", "Join Time", "Date"];
  const body = roster.map((a, i) => [roster.length - i, a.name, a.roll, a.time, a.date]);
  const content = [head, ...body].map(row => row.join(",")).join("\n");
  const blob = new Blob([content], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
