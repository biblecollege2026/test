<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduLive — Live Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- ORIGINAL STYLING PRESERVED --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--s1:#12151e;--s2:#181c28;--s3:#1e2335;
  --text:#e4e8f4;--muted:#6e7896;--accent:#4f82ff;
  --red:#ff4f4f;--green:#3cd381;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.6;overflow-x:hidden}

/* --- ADDED LIVE CLASSROOM STYLING --- */
.video-wrapper {
  position: relative;
  width: 100%;
  max-width: 1000px;
  margin: 2rem auto;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.live-indicator {
  position: absolute;
  top: 15px;
  left: 15px;
  background: var(--red);
  color: #fff;
  padding: 4px 12px;
  border-radius: 4px;
  font-weight: bold;
  font-size: 12px;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 6px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }

.no-skip-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50px; /* Covers Google Drive seek bar */
  background: transparent;
  z-index: 9;
}

iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

.hidden { display: none !important; }

/* --- ORIGINAL ATTENDANCE & UI COMPONENTS --- */
.container{max-width:1100px;margin:0 auto;padding:2rem}
.card{background:var(--s1);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:2rem}
.input-group{margin-bottom:1.5rem}
label{display:block;margin-bottom:0.5rem;color:var(--muted);font-size:0.9rem}
input{width:100%;padding:0.8rem 1rem;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--text);font-family:inherit}
button{background:var(--accent);color:#fff;border:none;padding:0.8rem 1.5rem;border-radius:8px;font-weight:600;cursor:pointer;transition:0.2s}
button:hover{filter:brightness(1.1)}

#attendance-log { margin-top: 3rem; background: var(--s1); border-radius: 16px; padding: 1.5rem; }
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.log-row { display: grid; grid-template-columns: 50px 1fr 1fr 120px; padding: 0.8rem; border-bottom: 1px solid var(--s3); font-size: 0.9rem; }
</style>
</head>
<body>

<div class="container">
  <div id="join-view" class="card">
    <h1 style="margin-bottom:1.5rem">Join Live Class</h1>
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="Enter your name">
    </div>
    <div class="input-group">
      <label>Roll Number</label>
      <input type="text" id="rollInput" placeholder="Enter your roll number">
    </div>
    <div class="input-group">
      <label>Class Video ID (Internal)</label>
      <input type="text" id="vidInput" placeholder="Paste Google Drive Link">
    </div>
    <button onclick="playLive()">Enter Classroom</button>
  </div>

  <div id="class-view" class="hidden">
    <div class="video-wrapper">
      <div class="live-indicator">● LIVE</div>
      <div class="no-skip-overlay"></div>
      <iframe id="vPlayer" src="" allow="autoplay"></iframe>
    </div>
    
    <div id="attendance-log">
      <div class="log-header">
        <h3>Class Attendance (<span id="tCount">0</span>)</h3>
        <div>
          <button onclick="exportCSV()" style="background:var(--s3); font-size:0.8rem">Export CSV</button>
          <button onclick="clearAtt()" style="background:var(--red); font-size:0.8rem">Clear</button>
        </div>
      </div>
      <div id="log-body">
        </div>
    </div>
  </div>
</div>

<script>
let roster = JSON.parse(localStorage.getItem('edu_roster')) || [];

function playLive() {
  const name = document.getElementById('nameInput').value.trim();
  const roll = document.getElementById('rollInput').value.trim();
  const vid = document.getElementById('vidInput').value.trim();

  if(!name || !roll || !vid) {
    alert("Please fill all details.");
    return;
  }

  const driveId = xid(vid);
  if(!driveId) {
    alert("Invalid Google Drive Link.");
    return;
  }

  // 1. Start Video
  document.getElementById('vPlayer').src = `https://drive.google.com/file/d/${driveId}/preview?autoplay=1`;
  
  // 2. Log Attendance
  const entry = {
    name,
    roll,
    time: new Date().toLocaleTimeString('en-IN'),
    date: new Date().toLocaleDateString('en-IN')
  };
  roster.unshift(entry);
  localStorage.setItem('edu_roster', JSON.stringify(roster));
  
  // 3. Switch View
  document.getElementById('join-view').classList.add('hidden');
  document.getElementById('class-view').classList.remove('hidden');
  renderAtt();
}

function renderAtt() {
  const body = document.getElementById('log-body');
  document.getElementById('tCount').textContent = roster.length;
  body.innerHTML = roster.map((a, i) => `
    <div class="log-row">
      <span>${roster.length - i}</span>
      <strong>${esc(a.name)}</strong>
      <span>${esc(a.roll)}</span>
      <span style="color:var(--muted)">${a.time}</span>
    </div>
  `).join('');
}

function exportCSV() {
  if(!roster.length) return;
  const rows = [["#", "Name", "Roll", "Time"], ...roster.map((a, i) => [roster.length-i, a.name, a.roll, a.time])];
  const csvContent = rows.map(e => e.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'attendance.csv');
  a.click();
}

function clearAtt() {
  if(confirm("Clear all records?")) {
    roster = [];
    localStorage.removeItem('edu_roster');
    renderAtt();
  }
}

function xid(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
  return m ? m[1] : null;
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Initial Render
renderAtt();
</script>

</body>
</html>
